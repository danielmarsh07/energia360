services:
  # ─── Backend API ───────────────────────────────────
  - type: web
    name: energia360-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: CORS_ORIGIN
        value: https://energia360.onrender.com

  # ─── Frontend ──────────────────────────────────────
  - type: web
    name: energia360
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://energia360-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
